name: CI

# Smoke-test mínimo enquanto o projeto ainda não rodou localmente pela primeira
# vez. Quando package-lock.json for gerado e commitado, reverter `npm install`
# para `npm ci` e remover os `continue-on-error` de lint/typecheck.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — install, lint, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

  python:
    name: Python — sintaxe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compilar módulos para detectar erros de sintaxe
        run: |
          python -m py_compile ops/importer/import_csv.py
          python -m py_compile ops/indexer/index_fs.py
